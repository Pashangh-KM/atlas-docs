<!DOCTYPE html>
<html>
<head>
  <title>Atlas Address API</title>

  <link rel="stylesheet"
  href="https://unpkg.com/swagger-ui-dist/swagger-ui.css"/>

  <style>
    .topbar { display:none !important; }
    .swagger-ui .info .url { display:none !important; }
  </style>

</head>

<body>

  SwaggerUIBundle({
    url: "./swagger.json",
    dom_id: "#swagger-ui",
    deepLinking: true
  });

};
</script>

</body>
</html>
