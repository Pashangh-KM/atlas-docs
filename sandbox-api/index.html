```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Atlas API Documentation</title>

<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css"/>

<style>

/* Page */
body {
  margin: 0;
  background: #f8fafc;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* Top Navbar */
.navbar {
  background: #0f172a;
  color: white;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-title {
  font-size: 18px;
  font-weight: 600;
}

.nav-sub {
  font-size: 13px;
  opacity: 0.7;
}

/* Hero Section */
.hero {
  padding: 40px 32px 20px 32px;
  max-width: 900px;
}

.hero h1 {
  font-size: 32px;
  margin-bottom: 10px;
  color: #0f172a;
}

.hero p {
  font-size: 16px;
  color: #475569;
  line-height: 1.6;
}

/* Card container */
.container {
  background: white;
  margin: 20px 32px 40px 32px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

/* Hide unwanted Swagger elements */
.swagger-ui .topbar {
  display: none;
}

.swagger-ui .info .link {
  display: none;
}

.swagger-ui .scheme-container {
  display: none;
}

/* Better spacing */
.swagger-ui .wrapper {
  padding: 0;
}

/* Make endpoints cleaner */
.swagger-ui .opblock {
  border-radius: 8px;
}

</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="nav-title">Sanboc Atlas API</div>
  <div class="nav-sub">Secure Business APIs</div>
</div>

<!-- Hero Section -->
<div class="hero">
  <h1>Upload API</h1>
  <p>
    This API allows partners to securely upload and process documents within the Atlas platform.
    It is designed for reliability, scalability, and seamless integration into business workflows.
  </p>
</div>

<!-- Swagger Container -->
<div class="container">
  <div id="swagger-ui"></div>
</div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

<script>
window.onload = function () {

  SwaggerUIBundle({
    url: "./swagger.json",
    dom_id: "#swagger-ui",
    deepLinking: true,
    supportedSubmitMethods: []  // disables "Try it out" (optional)
  });

};
</script>

</body>
</html>
```
